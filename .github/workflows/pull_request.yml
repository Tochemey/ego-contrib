name: pull_request

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - eventstore/memory
          - eventstore/postgres
          - durablestore/dynamodb
          - durablestore/cassandra
          - durablestore/postgres
          - durablestore/memory
          - offsetstore/memory
          - offsetstore/postgres
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
      - name: Vendor dependencies
        working-directory: ${{ matrix.module }}
        run: go mod vendor
      - name: Run Linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: ${{ matrix.module }}
          args: --timeout 10m

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - eventstore/memory
          - eventstore/postgres
          - durablestore/dynamodb
          - durablestore/cassandra
          - durablestore/postgres
          - durablestore/memory
          - offsetstore/memory
          - offsetstore/postgres
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
      - name: Vendor dependencies
        working-directory: ${{ matrix.module }}
        run: go mod vendor
      - name: Run Tests
        working-directory: ${{ matrix.module }}
        run: go test -mod=vendor ./... -timeout 0 -race -v -coverprofile=coverage.out -covermode=atomic -coverpkg=./...
